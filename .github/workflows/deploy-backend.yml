name: Deploy Backend to Production

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/anmian
            echo "[CI/CD] Pulling latest code..."
            git pull origin main
            
            echo "[CI/CD] Installing dependencies..."
            source venv/bin/activate
            pip install -r backend/requirements.txt -q
            
            echo "[CI/CD] Restarting service..."
            sudo systemctl restart anmian-backend.service
            
            echo "[CI/CD] Waiting for health check..."
            sleep 5
            for i in {1..10}; do
              if curl -sf http://127.0.0.1:8000/api/v1/admin/dashboard > /dev/null 2>&1; then
                echo "[CI/CD] ✅ Service is healthy"
                exit 0
              fi
              echo "[CI/CD] Waiting... ($i/10)"
              sleep 2
            done
            echo "[CI/CD] ❌ Health check failed"
            exit 1
