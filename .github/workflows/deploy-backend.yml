name: Deploy Backend to Production

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test SSH Connection
        id: ssh_test
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          timeout: 10s
          debug: true
          script: echo "SSH_OK"

      - name: Check SSH Result
        if: steps.ssh_test.outcome != 'success'
        run: |
          echo "❌ SSH CONNECTION FAILED"
          echo "Please check:"
          echo "1. SERVER_HOST is correct (current: '${{ secrets.SERVER_HOST }}')"
          echo "2. SERVER_USER is correct (current: '${{ secrets.SERVER_USER }}')"
          echo "3. SERVER_SSH_KEY is valid PEM format starting with '-----BEGIN RSA PRIVATE KEY-----'"
          echo "4. Server firewall allows port 22"
          exit 1

      - name: Deploy to server
        if: steps.ssh_test.outcome == 'success'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 5m
          script: |
            cd /home/ubuntu/anmian
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}
            source venv/bin/activate
            pip install -r backend/requirements.txt -q
            sudo systemctl restart anmian-backend.service
            sleep 5
            for i in {1..10}; do
              if curl -sf http://127.0.0.1:8000/api/v1/admin/dashboard > /dev/null 2>&1; then
                echo "✅ Service is healthy"
                exit 0
              fi
              sleep 2
            done
            echo "❌ Health check failed"
            exit 1
