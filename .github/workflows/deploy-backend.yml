name: Deploy Backend to Production

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify SSH Key Format
        run: |
          echo "Checking SSH key format..."
          KEY='${{ secrets.SERVER_SSH_KEY }}'
          if [ -z "$KEY" ]; then
            echo "❌ SERVER_SSH_KEY is empty"
            exit 1
          fi
          if echo "$KEY" | grep -q "BEGIN OPENSSH PRIVATE KEY"; then
            echo "⚠️ Key is in OpenSSH format, converting..."
          elif echo "$KEY" | grep -q "BEGIN RSA PRIVATE KEY"; then
            echo "✅ Key is in RSA PEM format"
          else
            echo "❌ Key format unknown. Must start with -----BEGIN RSA PRIVATE KEY-----"
            exit 1
          fi
          echo "Key length: $(echo "$KEY" | wc -c) bytes"
          echo "Key lines: $(echo "$KEY" | wc -l) lines"
          echo "First line: $(echo "$KEY" | head -1)"
          echo "Last line: $(echo "$KEY" | tail -1)"

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 5m
          debug: true
          script: |
            cd /home/ubuntu/anmian
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}
            source venv/bin/activate
            pip install -r backend/requirements.txt -q
            sudo systemctl restart anmian-backend.service
            sleep 5
            for i in {1..10}; do
              if curl -sf http://127.0.0.1:8000/api/v1/admin/dashboard > /dev/null 2>&1; then
                echo "✅ Service is healthy"
                exit 0
              fi
              sleep 2
            done
            echo "❌ Health check failed"
            exit 1
