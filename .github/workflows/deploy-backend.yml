name: Deploy Backend to Production

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Secrets
        run: |
          echo "[Verify] Checking secrets..."
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then echo "❌ SERVER_HOST is empty"; exit 1; fi
          if [ -z "${{ secrets.SERVER_USER }}" ]; then echo "❌ SERVER_USER is empty"; exit 1; fi
          if [ -z "${{ secrets.SERVER_SSH_KEY }}" ]; then echo "❌ SERVER_SSH_KEY is empty"; exit 1; fi
          echo "✅ All secrets are set"
          echo "Host length: $(echo '${{ secrets.SERVER_HOST }}' | wc -c)"
          echo "User length: $(echo '${{ secrets.SERVER_USER }}' | wc -c)"
          echo "Key length: $(echo '${{ secrets.SERVER_SSH_KEY }}' | wc -c)"

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 22 -t rsa 124.222.43.248 >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keyscan -p 22 -t ed25519 124.222.43.248 >> ~/.ssh/known_hosts 2>/dev/null || true
          cat ~/.ssh/known_hosts | wc -l

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 5m
          debug: true
          script_stop: false
          sync: false
          script: |
            set -x
            echo "[DEBUG] Connected as: $(whoami)"
            echo "[DEBUG] Hostname: $(hostname)"
            cd /home/ubuntu/anmian || exit 1
            echo "[DEBUG] In project dir"
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}
            source venv/bin/activate
            pip install -r backend/requirements.txt -q
            sudo systemctl restart anmian-backend.service
            sleep 5
            for i in {1..10}; do
              if curl -sf http://127.0.0.1:8000/api/v1/admin/dashboard > /dev/null 2>&1; then
                echo "✅ Service is healthy"
                exit 0
              fi
              echo "Waiting..."
              sleep 2
            done
            echo "❌ Health check failed"
            exit 1
