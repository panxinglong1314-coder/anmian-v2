name: Backend Tests

# 在 PR 阶段拦截回归 — 部署 workflow 应仅在测试通过后执行
on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/test.yml'
  workflow_call:  # 被 deploy-backend.yml 作为 gate 复用
  workflow_dispatch:

jobs:
  pytest:
    name: pytest (Python 3.10)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        working-directory: backend
        run: |
          python -m pytest tests/ -v --tb=short --color=yes
        env:
          # 单元测试不应依赖任何真实凭证；任何用到这些的测试都应该
          # 用 fakeredis / mock，未 mock 的测试这里就会暴露
          JWT_SECRET: ci-test-secret-not-for-prod
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Test summary
        if: always()
        working-directory: backend
        run: |
          echo "## 📊 Test Summary" >> $GITHUB_STEP_SUMMARY
          python -m pytest tests/ --tb=no -q 2>&1 | tail -5 >> $GITHUB_STEP_SUMMARY || true
