# 睡前大脑关机助手 - Docker 部署配置
# 域名: sleepai.chat | 服务器: 124.222.43.248

version: '3.8'

services:
  # ==================== API 后端 ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sleep-brain-backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - QWEN_API_KEY=${QWEN_API_KEY}
      - QWEN_BASE_URL=${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - TENCENTCLOUD_APP_ID=${TENCENTCLOUD_APP_ID}
      - TENCENTCLOUD_SECRET_ID=${TENCENTCLOUD_SECRET_ID}
      - TENCENTCLOUD_SECRET_KEY=${TENCENTCLOUD_SECRET_KEY}
      - TENCENTCLOUD_REGION=${TENCENTCLOUD_REGION:-ap-guangzhou}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: sleep-brain-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== Nginx 反向代理 + SSL ====================
  nginx:
    image: nginx:alpine
    container_name: sleep-brain-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - backend

  # ==================== Certbot SSL 自动续期 ====================
  certbot:
    image: certbot/certbot:latest
    container_name: sleep-brain-certbot
    restart: unless-stopped
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt:rw
      - ./nginx/certbot/www:/var/www/certbot:ro
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done;'"
    depends_on:
      - nginx

volumes:
  redis_data:
