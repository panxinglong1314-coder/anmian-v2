<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>ECharts 诊断</title>
</head>
<body style="font-family:sans-serif;padding:20px;background:#111;color:#fff">
<h2>ECharts 加载诊断</h2>
<div id="result" style="font-size:18px;padding:20px;background:#222;border-radius:8px;margin:10px 0">
  加载中...
</div>
<div id="detail" style="font-size:14px;padding:10px;background:#1a1a1a;border-radius:8px;margin:10px 0"></div>
<script>
// Immediately load echarts
var script = document.createElement('script');
script.src = '/admin/echarts.min.js?v=121145';
script.onload = function() {
  document.getElementById('result').innerHTML = '✅ ECharts 加载成功，版本：' + (echarts.version || '未知');
  document.getElementById('detail').innerHTML = 
    'echarts 类型: ' + typeof echarts + '<br>' +
    'echarts.init: ' + (typeof echarts.init) + '<br>' +
    'window.echarts: ' + (typeof window.echarts);
  // Try creating a chart
  try {
    var testDiv = document.createElement('div');
    testDiv.style.cssText = 'width:200px;height:100px';
    document.body.appendChild(testDiv);
    var chart = echarts.init(testDiv);
    chart.setOption({title:{text:'测试OK'},xAxis:{data:['A','B']},yAxis:{},series:[{type:'line',data:[1,2]}]});
    document.getElementById('detail').innerHTML += '<br><span style="color:#0f0">✅ 图表渲染成功！</span>';
  } catch(e) {
    document.getElementById('detail').innerHTML += '<br><span style="color:red">图表渲染失败: ' + e.message + '</span>';
  }
};
script.onerror = function(e) {
  document.getElementById('result').innerHTML = '❌ ECharts 加载失败';
  document.getElementById('detail').innerHTML = 'onerror 事件触发<br>src: ' + script.src;
};
document.head.appendChild(script);
</script>
</body>
</html>
